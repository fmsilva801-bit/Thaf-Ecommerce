<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THAF E-COMMERCE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 700px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { margin: 0 0 16px; font-size: 42px; }
    p { font-size: 18px; line-height: 1.6; color: #555; }
    .btns {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
    }
    .primary {
      background: #111;
      color: white;
    }
    .secondary {
      background: #eee;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>THAF E-COMMERCE</h1>
    <p>Plataforma de gestão para e-commerce com controle de produtos, estoque, vendas, compras, financeiros e usuários.</p>
    <div class="btns">
      <a class="primary" href="/login">Entrar</a>
      <a class="secondary" href="/signup">Criar minha empresa</a>
    </div>
  </div>
</body>
</html>
